    async function login() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const msg = document.getElementById('loginMsg');
      msg.innerHTML = '';

      if (!email || !senha) {
        msg.innerHTML = `<div class="erro">Informe e-mail e senha.</div>`;
        return;
      }

      if (!estaOnline()) {
        await loginOffline(email, senha);
        return;
      }

      try {
        const { data, error } = await client.auth.signInWithPassword({
          email,
          password: senha
        });

        if (error) {
          // Erro de credencial inválida vindo do servidor: nunca cair para offline aqui,
          // pois isso permitiria adivinhar senha contra o cache local indefinidamente
          // sem o servidor saber. Se a mensagem indicar problema de rede, tentamos offline.
          const pareceErroDeRede = /fetch|network|failed to fetch|NetworkError/i.test(error.message || '');

          if (pareceErroDeRede) {
            msg.innerHTML = `<div class="erro">Sem conexão com o servidor. Tentando login offline...</div>`;
            await loginOffline(email, senha);
            return;
          }

          msg.innerHTML = `<div class="erro">${error.message}</div>`;
          return;
        }

        if (!data?.user) {
          msg.innerHTML = `<div class="erro">Usuário não retornado no login.</div>`;
          return;
        }

        usuario = data.user;
        modoOffline = false;
        await carregarPerfil();

      } catch (err) {
        // Falha de fetch (sem internet de fato, DNS, timeout, etc.)
        msg.innerHTML = `<div class="erro">Sem conexão com o servidor. Tentando login offline...</div>`;
        await loginOffline(email, senha);
      }
    }

    async function carregarPerfil() {
      const msg = document.getElementById('loginMsg');

      try {
        const { data, error } = await client
          .from('perfis')
          .select('*')
          .eq('id', usuario.id)
          .single();

        if (error) {
          msg.innerHTML = `<div class="erro">Erro ao carregar perfil: ${error.message}</div>`;
          return;
        }

        if (!data) {
          msg.innerHTML = `<div class="erro">Perfil não encontrado para este usuário.</div>`;
          return;
        }

        perfil = data;

        // Login online bem-sucedido: atualiza o cache offline com o perfil mais
        // recente e a senha que acabou de funcionar, para permitir login offline depois.
        const senhaDigitada = document.getElementById('senha').value.trim();
        if (senhaDigitada) {
          await salvarCredencialOffline(perfil.email, senhaDigitada, perfil);
        }

        abrirAppComPerfil();

      } catch (err) {
        msg.innerHTML = `<div class="erro">Falha ao abrir o app: ${err.message}</div>`;
      }
    }

    async function loginOffline(email, senha) {
      const msg = document.getElementById('loginMsg');

      let cache;
      try {
        cache = await buscarCredencialOffline(email);
      } catch (err) {
        msg.innerHTML = `<div class="erro">Não foi possível acessar os dados salvos neste aparelho (${err.message}). Se você tiver outra aba ou janela deste app aberta, feche-a e recarregue esta página.</div>`;
        return;
      }

      if (!cache) {
        msg.innerHTML = `<div class="erro">Sem internet e nenhum login anterior encontrado neste aparelho para este e-mail. É necessário fazer login online pelo menos uma vez antes de usar offline.</div>`;
        return;
      }

      let senhaOk;
      try {
        senhaOk = await validarSenhaOffline(senha, cache.salt, cache.hash);
      } catch (err) {
        msg.innerHTML = `<div class="erro">Falha ao verificar a senha offline: ${err.message}</div>`;
        return;
      }

      if (!senhaOk) {
        msg.innerHTML = `<div class="erro">Senha incorreta (verificação offline).</div>`;
        return;
      }

      if (!cache.perfil?.ativo) {
        msg.innerHTML = `<div class="erro">Usuário inativo. Não é possível entrar offline.</div>`;
        return;
      }

      if (cache.revogado_offline_em) {
        msg.innerHTML = `<div class="erro">O acesso offline deste usuário foi revogado pelo administrador. Conecte-se à internet para fazer login online e renovar o acesso.</div>`;
        return;
      }

      usuario = { id: cache.perfil.id, email: cache.perfil.email };
      perfil = cache.perfil;
      modoOffline = true;

      abrirAppComPerfil();
    }

}

async function solicitarManutencao() {

    const tipo = document.getElementById("manTipo").value;
    const maquina_id = document.getElementById("manMaquina").value;
    const estado_equipamento = document.getElementById("manEstado").value;
    const problema = document.getElementById("manProblema").value.trim();
    const gravidade = document.getElementById("manGravidade").value;
    const impacto = document.getElementById("manImpacto").value.trim();

    const msg = document.getElementById("manutencaoMsg");

    msg.innerHTML = "";

    if (
        !tipo ||
        !maquina_id ||
        !estado_equipamento ||
        !problema ||
        !gravidade
    ){
        msg.innerHTML = `<div class="erro">Preencha todos os campos obrigatórios.</div>`;
        return;
    }

    try{

        const { data: sessao } = await client.auth.getSession();

        const token = sessao?.session?.access_token;

        const resp = await fetch(
            "https://mzawmvqrlrptidcwxkoi.supabase.co/functions/v1/solicitar-manutencao",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":`Bearer ${token}`,
                    "apikey":SUPABASE_KEY
                },
                body:JSON.stringify({

                    tipo,
                    maquina_id,
                    estado_equipamento,
                    problema,
                    gravidade,
                    impacto,

                    offline_id:crypto.randomUUID()

                })
            }
        );

        const json = await resp.json();

        if(!resp.ok){

            msg.innerHTML=`<div class="erro">${json.error}</div>`;
            return;

        }

        msg.innerHTML=`<div class="ok">${json.message}</div>`;

        document.getElementById("manTipo").value="";
        document.getElementById("manMaquina").value="";
        document.getElementById("manEstado").value="";
        document.getElementById("manProblema").value="";
        document.getElementById("manGravidade").value="";
        document.getElementById("manImpacto").value="";

    }

    catch(e){

        msg.innerHTML=`<div class="erro">${e.message}</div>`;

    }

}
    async function criarUsuario() {
      const nome = document.getElementById('novoNome').value.trim();
      const email = document.getElementById('novoEmail').value.trim();
      const password = document.getElementById('novoPassword').value.trim();
      const setor = document.getElementById('novoSetor').value.trim();
      const cargo = document.getElementById('novoCargo').value.trim();
      const admin = document.getElementById('novoAdmin').checked;
      const multi_setor = document.getElementById('novoMultiSetor').checked;
      const msg = document.getElementById('adminMsg');

      msg.innerHTML = '';

      if (!nome || !email || !password || !setor || !cargo) {
        msg.innerHTML = `<div class="erro">Preencha todos os campos.</div>`;
        return;
      }

      try {
        const { data: sessao, error: erroSessao } = await client.auth.getSession();

        if (erroSessao || !sessao?.session?.access_token) {
          msg.innerHTML = `<div class="erro">Sessão inválida. Saia e entre novamente.</div>`;
          return;
        }

        const accessToken = sessao.session.access_token;

        const resp = await fetch('https://mzawmvqrlrptidcwxkoi.supabase.co/functions/v1/criar-usuarios', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`,
            'apikey': SUPABASE_KEY
          },
          body: JSON.stringify({
            nome,
            email,
            password,
            setor,
            cargo,
            admin,
            multi_setor
          })
        });

        const texto = await resp.text();
        let json = {};

        try { json = JSON.parse(texto); } catch (_) {}

        if (!resp.ok) {
          msg.innerHTML = `<div class="erro">Status ${resp.status}: ${json.error || texto || 'Erro ao criar usuário.'}</div>`;
          return;
        }

        msg.innerHTML = `<div class="ok">${json.message || 'Usuário criado com sucesso.'}</div>`;

        document.getElementById('novoNome').value = '';
        document.getElementById('novoEmail').value = '';
        document.getElementById('novoPassword').value = '';
        document.getElementById('novoSetor').value = '';
        document.getElementById('novoCargo').value = 'Lider';
        document.getElementById('novoAdmin').checked = false;
        document.getElementById('novoMultiSetor').checked = false;

        await carregarUsuariosAdmin();

      } catch (err) {
        msg.innerHTML = `<div class="erro">Erro de conexão: ${err.message}</div>`;
      }
    }

    async function revogarAcessoOfflineAdmin(userId) {
      const msg = document.getElementById(`msg_${userId}`);
      msg.innerHTML = '';

      const confirmar = confirm(
        'Isso vai invalidar o login offline desse usuário a partir da próxima vez que o aparelho dele conectar à internet.\n\n' +
        'Importante: se o aparelho já estiver offline AGORA com uma sessão aberta, ele continuará funcionando até reconectar — não existe forma de revogar instantaneamente um aparelho sem rede.\n\n' +
        'Deseja continuar?'
      );
      if (!confirmar) return;

      const { error } = await client
        .from('perfis')
        .update({ revogado_offline_em: new Date().toISOString() })
        .eq('id', userId);

      if (error) {
        msg.innerHTML = `<div class="erro">${error.message}</div>`;
        return;
      }

      msg.innerHTML = `<div class="ok">Acesso offline revogado. Terá efeito no próximo login online desse usuário.</div>`;
      await carregarUsuariosAdmin();
    }

    async function salvarUsuarioAdmin(userId) {
      const msg = document.getElementById(`msg_${userId}`);
      msg.innerHTML = '';

   ========================================================= */
async function abrirParada() {
  const select = document.getElementById('maquinaSelect');
  const option = select.options[select.selectedIndex];

  const maquinaId = select.value;
  const maquinaNome = option?.dataset?.nome || '';
  const setorSelecionado = document.getElementById('setorSelect').value || option?.dataset?.setor || perfil.setor;
  const dataParada = document.getElementById('dataParada').value;
  const motivo = document.getElementById('motivo').value.trim();
  const horaInicio = document.getElementById('horaInicio').value;
  const msg = document.getElementById('novaParadaMsg');

  msg.innerHTML = '';

  if (!maquinaId || !dataParada || !motivo || !horaInicio || !setorSelecionado) {
    msg.innerHTML = `<div class="erro">Preencha todos os campos.</div>`;
    return;
  }

  const offlineId = gerarUUID();

  const payload = {
    maquina_id: maquinaId,
    maquina_nome: maquinaNome,
    setor: setorSelecionado,
    data_parada: dataParada,
    motivo: motivo,
    hora_inicio: horaInicio,
    usuario_id: usuario.id,
    usuario_nome: perfil.nome,
    status: 'ABERTA',
    offline_id: offlineId
  };

  if (!estaOnline() || modoOffline) {
    await adicionarFilaCriacao(payload);

    msg.innerHTML = modoOffline && estaOnline()
      ? `<div class="ok">Parada salva no app. Sua sessão ainda é offline — conecte-se novamente pelo login para sincronizar com o servidor.</div>`
      : `<div class="ok">Sem internet. Parada salva no app e será sincronizada quando a conexão voltar.</div>`;

    notificarNovaParada(
      'Nova parada registrada',
      `${maquinaNome} - ${setorSelecionado} (salva offline)`
    );

    limparFormularioNovaParada();
    atualizarInfoFilaOffline();
    return;
  }

  try {
    const { error } = await client
      .from('paradas')
      .insert([payload]);

    if (error) {
      await adicionarFilaCriacao(payload);
      msg.innerHTML = `<div class="erro">Falha ao gravar online. A parada foi guardada no app para sincronizar depois.</div>`;
      atualizarInfoFilaOffline();
      return;
    }
  } catch (err) {
    await adicionarFilaCriacao(payload);
    msg.innerHTML = `<div class="erro">Falha de conexão. A parada foi guardada no app para sincronizar depois.</div>`;
    atualizarInfoFilaOffline();
    return;
  }

  msg.innerHTML = `<div class="ok">Parada aberta com sucesso.</div>`;

  notificarNovaParada(
    'Nova parada registrada',
    `${maquinaNome} - ${setorSelecionado}`
  );

  limparFormularioNovaParada();

  await carregarAbertas();
  await carregarHistorico();
  await carregarDashboard();
}

async function finalizarParada(id, horaInicio) {
  const horaFim = document.getElementById(`fim_${id}`).value;
  const observacao = document.getElementById(`obs_${id}`).value.trim();

  if (!horaFim) {
    alert('Informe a hora final.');
    return;
  }

  const duracao = calcularDuracaoMin(horaInicio, horaFim);

  const dadosFinalizacao = {
    hora_fim: horaFim,
    observacao: observacao,
    status: 'FINALIZADA',
    duracao_min: duracao
  };

  if (!estaOnline() || modoOffline) {
    await adicionarFilaFinalizacao({
      parada_id: id,
      offline_id: gerarUUID(),
      ...dadosFinalizacao
    });

    alert(
      modoOffline && estaOnline()
        ? 'Finalização salva no app. Sua sessão ainda é offline — conecte-se novamente pelo login para sincronizar com o servidor.'
        : 'Sem internet. A finalização foi guardada no app e será sincronizada quando a conexão voltar.'
    );
    atualizarInfoFilaOffline();
    await atualizarPainelPendenciasAbertas();
    return;
  }

  try {
    const { error } = await client
      .from('paradas')
      .update(dadosFinalizacao)
      .eq('id', id);

    if (error) {
      await adicionarFilaFinalizacao({
        parada_id: id,
        offline_id: gerarUUID(),
        ...dadosFinalizacao
      });
      alert('Falha ao gravar online. A finalização foi guardada no app para sincronizar depois.');
      atualizarInfoFilaOffline();
      await atualizarPainelPendenciasAbertas();
      return;
    }
  } catch (err) {
    await adicionarFilaFinalizacao({
      parada_id: id,
      offline_id: gerarUUID(),
      ...dadosFinalizacao
    });
    alert('Falha de conexão. A finalização foi guardada no app para sincronizar depois.');
    atualizarInfoFilaOffline();
    await atualizarPainelPendenciasAbertas();
    return;
  }

  alert('Parada finalizada com sucesso.');

  await carregarAbertas();
  await carregarHistorico();
  await carregarDashboard();
}

    async function carregarDashboard() {
      const inicio = document.getElementById('filtroInicioDash').value;
      const fim = document.getElementById('filtroFimDash').value;

      let query = client
        .from('paradas')
        .select('*')

        .lte('data_parada', fim);

      if (!perfil.admin && !perfil.multi_setor) {
        query = query.eq('setor', perfil.setor);
      }

      const { data, error } = await query;

      if (error) {
        document.getElementById('resumoBoxes').innerHTML = `<div class="erro">${error.message}</div>`;
        return;
      }

      const totalParadas = data.length;
      const abertas = data.filter(x => x.status === 'ABERTA').length;
      const finalizadas = data.filter(x => x.status === 'FINALIZADA').length;
      const totalMin = data.reduce((s, x) => s + Number(x.duracao_min || 0), 0);

      document.getElementById('resumoBoxes').innerHTML = `
        <div class="item"><b>Total de paradas</b><br><h2>${totalParadas}</h2></div>
        <div class="item"><b>Em aberto</b><br><h2>${abertas}</h2></div>
        <div class="item"><b>Finalizadas</b><br><h2>${finalizadas}</h2></div>
        <div class="item"><b>Horas acumuladas</b><br><h2>${minutosParaHora(totalMin)}</h2></div>
      `;

      const resumoMaquinas = {};

      data.forEach(item => {
        if (!resumoMaquinas[item.maquina_nome]) {
          resumoMaquinas[item.maquina_nome] = { qtd: 0, min: 0 };
        }

        resumoMaquinas[item.maquina_nome].qtd += 1;
        resumoMaquinas[item.maquina_nome].min += Number(item.duracao_min || 0);
      });

      const linhas = Object.entries(resumoMaquinas)
        .sort((a, b) => b[1].min - a[1].min)
        .map(([maquina, v]) => `
          <tr>
            <td>${maquina}</td>
            <td>${v.qtd}</td>
            <td>${minutosParaHora(v.min)}</td>
          </tr>
        `).join('');

      document.getElementById('tabelaMaquinas').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Máquina</th>
              <th>Qtd. paradas</th>
              <th>Tempo acumulado</th>
            </tr>
          </thead>
          <tbody>
            ${linhas || '<tr><td colspan="3">Sem dados</td></tr>'}
          </tbody>
        </table>
      `;
    }

    function hojeISO() {
      const hoje = new Date();
      return hoje.toISOString().slice(0, 10);
    }

    function primeiroDiaMes() {
      const d = new Date();
      d.setDate(1);
      return d.toISOString().slice(0, 10);
    }

    function calcularDuracaoMin(horaInicio, horaFim) {
      const [hi, mi] = horaInicio.split(':').map(Number);
      const [hf, mf] = horaFim.split(':').map(Number);

      let inicio = hi * 60 + mi;
      let fim = hf * 60 + mf;
      let total = fim - inicio;

      if (total < 0) total += 1440;

      return total;
    }

    function minutosParaHora(min) {
      const total = Number(min || 0);
      const horas = Math.floor(total / 60);
      const minutos = total % 60;

      return String(horas).padStart(2, '0') + ':' + String(minutos).padStart(2, '0');
    }

/* =========================================================
   ARMAZENAMENTO OFFLINE — IndexedDB
   Bancos: criacoes_pendentes, finalizacoes_pendentes, credenciais_offline, config_cache, sessao_local
   ========================================================= */
const DB_NOME = 'paradas_offline_db';
const DB_VERSAO = 4;
const STORE_CRIACOES = 'criacoes_pendentes';
const STORE_FINALIZACOES = 'finalizacoes_pendentes';
const STORE_CREDENCIAIS = 'credenciais_offline';
const STORE_CONFIG = 'config_cache';
const STORE_SESSAO = 'sessao_local';

let dbPromise = null;

function abrirDB() {
  if (dbPromise) return dbPromise;

  dbPromise = new Promise((resolve, reject) => {
    let resolvido = false;

    const req = indexedDB.open(DB_NOME, DB_VERSAO);

    req.onupgradeneeded = (evento) => {
      const db = evento.target.result;

      if (!db.objectStoreNames.contains(STORE_CRIACOES)) {
        db.createObjectStore(STORE_CRIACOES, { keyPath: 'offline_id' });
      }

      if (!db.objectStoreNames.contains(STORE_FINALIZACOES)) {
        db.createObjectStore(STORE_FINALIZACOES, { keyPath: 'offline_id' });
      }

      if (!db.objectStoreNames.contains(STORE_CREDENCIAIS)) {
        // chave = e-mail em minúsculas, para permitir múltiplos usuários no mesmo aparelho
        db.createObjectStore(STORE_CREDENCIAIS, { keyPath: 'email' });
      }

      if (!db.objectStoreNames.contains(STORE_CONFIG)) {
        // chave = nome da config ('setores', 'maquinas'), valor = array cacheado
        db.createObjectStore(STORE_CONFIG, { keyPath: 'chave' });
      }

      if (!db.objectStoreNames.contains(STORE_SESSAO)) {
        // registro único (chave fixa 'atual') com a sessão ativa neste aparelho,
        // permitindo restaurá-la após reload/fechar o app sem pedir senha de novo
        db.createObjectStore(STORE_SESSAO, { keyPath: 'chave' });
      }
    };

    req.onblocked = () => {
      // Outra aba/instância do app está com uma versão antiga do banco aberta
      // e não liberou a conexão. Sem isso, o open() acima ficaria pendurado
      // pra sempre, sem erro nenhum aparecer — é exatamente esse o cenário que
      // trava o login offline silenciosamente após um deploy de nova versão.
      console.warn('IndexedDB bloqueado por outra aba/instância. Feche outras abas do app e recarregue.');
      if (!resolvido) {
        resolvido = true;
        dbPromise = null; // permite tentar de novo na próxima chamada
        reject(new Error('Banco local bloqueado por outra aba do app aberta. Feche as outras abas/instâncias do Controle de Paradas e tente novamente.'));
      }
    };

    req.onsuccess = (evento) => {
      if (resolvido) return;
      resolvido = true;

      const db = evento.target.result;

      // Se outra aba tentar abrir uma versão mais nova do banco no futuro,
      // esta conexão se fecha voluntariamente em vez de bloquear a outra aba.
      db.onversionchange = () => {
        db.close();
        dbPromise = null;
      };

      resolve(db);
    };

    req.onerror = (evento) => {
      if (resolvido) return;
      resolvido = true;
      dbPromise = null; // permite tentar de novo na próxima chamada, em vez de ficar preso num erro antigo
      reject(evento.target.error);
    };

    // Timeout de segurança: se nada (sucesso, erro ou blocked) responder em
    // 8 segundos, desiste e libera para uma nova tentativa, em vez de travar
    // a UI esperando para sempre.
    setTimeout(() => {
      if (!resolvido) {
        resolvido = true;
        dbPromise = null;
        reject(new Error('Tempo esgotado ao abrir o banco local (IndexedDB). Tente fechar outras abas do app e recarregar a página.'));
      }
    }, 8000);
  });

  return dbPromise;
}

function dbTransacao(storeName, modo) {
  return abrirDB().then(db => db.transaction(storeName, modo).objectStore(storeName));
}

async function dbAdicionar(storeName, registro) {
  const store = await dbTransacao(storeName, 'readwrite');
  return new Promise((resolve, reject) => {
    const req = store.put(registro);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

async function dbListarTodos(storeName) {
  const store = await dbTransacao(storeName, 'readonly');
  return new Promise((resolve, reject) => {
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function dbRemover(storeName, chave) {
  const store = await dbTransacao(storeName, 'readwrite');
  return new Promise((resolve, reject) => {
    const req = store.delete(chave);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

async function dbAtualizar(storeName, registro) {
  return dbAdicionar(storeName, registro);
}

function gerarUUID() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = (Math.random() * 16) | 0;
    const v = c === 'x' ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

/* =========================================================
   LOGIN OFFLINE — hash de senha (PBKDF2/SHA-256, 100k iterações)
   A senha em texto puro NUNCA é gravada; só salt + hash derivado.
   ========================================================= */
function bufferParaBase64(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

function base64ParaBuffer(base64) {
  const binario = atob(base64);
  const bytes = new Uint8Array(binario.length);
  for (let i = 0; i < binario.length; i++) bytes[i] = binario.charCodeAt(i);
  return bytes;
}

async function gerarSaltAleatorio() {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  return bufferParaBase64(salt);
}

async function derivarHashSenha(senha, saltBase64) {
  const salt = base64ParaBuffer(saltBase64);
  const encoder = new TextEncoder();
  const senhaBuffer = encoder.encode(senha);

  const chaveBase = await crypto.subtle.importKey(
    'raw',
    senhaBuffer,
    { name: 'PBKDF2' },
    false,
    ['deriveBits']
  );

  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    chaveBase,
    256
  );

  return bufferParaBase64(bits);
}

async function validarSenhaOffline(senhaDigitada, saltBase64, hashEsperado) {
  const hashCalculado = await derivarHashSenha(senhaDigitada, saltBase64);
  return hashCalculado === hashEsperado;
}

async function salvarCredencialOffline(email, senha, perfilAtual) {
  if (!email) return;

  const emailChave = email.trim().toLowerCase();
  const salt = await gerarSaltAleatorio();
  const hash = await derivarHashSenha(senha, salt);

  await dbAdicionar(STORE_CREDENCIAIS, {
    email: emailChave,
    salt,
    hash,
    perfil: perfilAtual,
    revogado_offline_em: perfilAtual.revogado_offline_em || null,
    atualizado_em: new Date().toISOString()
  });
}

async function buscarCredencialOffline(email) {
  if (!email) return null;
  const emailChave = email.trim().toLowerCase();

  try {
    const store = await dbTransacao(STORE_CREDENCIAIS, 'readonly');
    return await new Promise((resolve, reject) => {
      const req = store.get(emailChave);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch {
    return null;
  }
}

/* =========================================================
   CACHE DE CONFIGURAÇÃO (setores/máquinas) PARA USO OFFLINE
   ========================================================= */
async function salvarCacheConfig(chave, valor) {
  try {
    await dbAdicionar(STORE_CONFIG, { chave, valor, atualizado_em: new Date().toISOString() });
  } catch {
    // Se falhar ao cachear, não é crítico: só significa que o fallback offline
    // futuro pode não ter essa lista disponível.
  }
}

async function buscarCacheConfig(chave) {
  try {
    const store = await dbTransacao(STORE_CONFIG, 'readonly');
    const registro = await new Promise((resolve, reject) => {
      const req = store.get(chave);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
    return registro ? registro.valor : null;
  } catch {
    return null;
  }
}

/* =========================================================
   SESSÃO LOCAL PERSISTIDA
   Mantém o login ativo entre reloads/fechar o app, mesmo offline.
   Guarda só o necessário para reabrir a UI; nunca a senha.
   ========================================================= */
async function salvarSessaoLocal() {
  try {
    await dbAdicionar(STORE_SESSAO, {
      chave: 'atual',
      usuario_id: usuario?.id || null,
      usuario_email: usuario?.email || perfil?.email || null,
      perfil,
      modoOffline,
      salvo_em: new Date().toISOString()
    });
  } catch {
    // Se isso falhar, o pior caso é o usuário precisar logar de novo no próximo reload.
  }
}

async function buscarSessaoLocal() {
  try {
    const store = await dbTransacao(STORE_SESSAO, 'readonly');
    return await new Promise((resolve, reject) => {
      const req = store.get('atual');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch {
    return null;
  }
}

async function limparSessaoLocal() {
  try {
    await dbRemover(STORE_SESSAO, 'atual');
  } catch {
    // não crítico
  }
}

async function restaurarSessaoLocal() {
  try {
    const sessao = await buscarSessaoLocal();
    if (!sessao || !sessao.perfil) return false;

    // Se a sessão guardada era offline, revalida revogação/inatividade pelo cache de
    // credenciais (que é atualizado sempre que o admin revoga ou o usuário desativa).
    if (sessao.modoOffline) {
      const cache = await buscarCredencialOffline(sessao.usuario_email);

      if (!cache || cache.revogado_offline_em || !cache.perfil?.ativo) {
        await limparSessaoLocal();
        return false;
      }

      usuario = { id: cache.perfil.id, email: cache.perfil.email };
      perfil = cache.perfil;
      modoOffline = true;
      abrirAppComPerfil();
      return true;
    }

    // Sessão era online: tenta restaurar de fato a sessão do Supabase se houver rede;
    // se não houver rede agora, ainda assim reabre a UI com os dados em cache,
    // em modo degradado (equivalente a uma sessão offline), para não travar o usuário.
    if (estaOnline()) {
      try {
        const { data } = await client.auth.getSession();
        if (data?.session?.user) {
          usuario = data.session.user;
          modoOffline = false;
          await carregarPerfil();
          return true;
        }
      } catch {
        // cai para o modo degradado abaixo
      }
    }

    usuario = { id: sessao.perfil.id, email: sessao.perfil.email };
    perfil = sessao.perfil;
    modoOffline = true;
    abrirAppComPerfil();
    return true;

  } catch (err) {
    // Falha ao acessar o banco local (ex: bloqueado por outra aba). Não trava a
    // página: deixa cair na tela de login normalmente, com um aviso explicativo.
    console.warn('Não foi possível restaurar a sessão local:', err.message);
    const msg = document.getElementById('loginMsg');
    if (msg) {
      msg.innerHTML = `<div class="erro">Não foi possível restaurar sua sessão automaticamente (${err.message}). Se houver outra aba deste app aberta, feche-a e recarregue. Você ainda pode fazer login manualmente abaixo.</div>`;
    }
    return false;
  }
}

async function contarPendencias() {
  const [criacoes, finalizacoes] = await Promise.all([
    dbListarTodos(STORE_CRIACOES),
    dbListarTodos(STORE_FINALIZACOES)
  ]);
  return { criacoes: criacoes.length, finalizacoes: finalizacoes.length };
}

async function atualizarInfoFilaOffline() {
  const el = document.getElementById('filaOfflineInfo');
  if (!el) return;

  const { criacoes, finalizacoes } = await contarPendencias();
  const total = criacoes + finalizacoes;

  if (!total) {
    el.innerHTML = 'Sem pendências offline.';
    return;
  }

  const partes = [];
  if (criacoes) partes.push(`${criacoes} abertura(s)`);
  if (finalizacoes) partes.push(`${finalizacoes} finalização(ões)`);

  el.innerHTML = `<span class="erro">${total} pendência(s) para sincronizar: ${partes.join(' e ')}.</span>`;
}

async function atualizarPainelPendenciasAbertas() {
  const div = document.getElementById('painelPendenciasAbertas');
  if (!div) return;

  const criacoes = await dbListarTodos(STORE_CRIACOES);
  const finalizacoes = await dbListarTodos(STORE_FINALIZACOES);
  const total = criacoes.length + finalizacoes.length;

  if (!total) {
    div.innerHTML = `
      <div class="painel-offline sem-pendencia">
        <b>✅ Sem pendências offline.</b>
        <div class="small">Tudo que foi lançado já está sincronizado com o servidor.</div>
      </div>
    `;
    return;
  }

  const linhasCriacoes = criacoes.map(c => `
    <div class="linha-pendencia">
      <span><span class="tag-tipo">Abertura</span> ${c.maquina_nome || 'Máquina'} — ${c.setor || ''} (${c.data_parada || ''} ${c.hora_inicio || ''})</span>
    </div>
  `).join('');

  const linhasFinalizacoes = finalizacoes.map(f => `
    <div class="linha-pendencia">
      <span><span class="tag-tipo">Finalização</span> Parada ref. ${String(f.parada_id || f.offline_id_referencia || '').slice(0, 8)} — fim ${f.hora_fim || ''}</span>
    </div>
  `).join('');

  div.innerHTML = `
    <div class="painel-offline">
      <b>⏳ ${total} pendência(s) aguardando sincronização</b>
      <div class="small" style="margin: 6px 0 10px;">Serão enviadas automaticamente quando a internet voltar.</div>
      ${linhasCriacoes}
      ${linhasFinalizacoes}
      <button class="btn-warning" style="margin-top:10px;" onclick="tentarSincronizarAgora()" ${sincronizando ? 'disabled' : ''}>
        ${sincronizando ? 'Sincronizando...' : 'Tentar sincronizar agora'}
      </button>
    </div>
  `;
}

async function tentarSincronizarAgora() {
  if (!estaOnline()) {
    alert('Ainda sem internet. Aguarde a conexão voltar ou tente novamente em outra área.');
    return;
  }
  await sincronizarFilaOffline();
}

/* =========================================================
   SINCRONIZAÇÃO
   Ordem: 1) criações pendentes  2) finalizações pendentes
   Lock simples evita disparos concorrentes (evento online + reabrir app)
   ========================================================= */
async function sincronizarFilaOffline() {
  if (sincronizando) return;
  if (!estaOnline()) return;

  sincronizando = true;
  await atualizarPainelPendenciasAbertas();

  try {
    await sincronizarCriacoesPendentes();
    await sincronizarFinalizacoesPendentes();
  } finally {
    sincronizando = false;
  }

  await atualizarInfoFilaOffline();
  await atualizarPainelPendenciasAbertas();

  if (document.getElementById('abertasTela') && !document.getElementById('abertasTela').classList.contains('hidden')) {
    await carregarAbertas();
  }
  await carregarHistorico();
  await carregarDashboard();
}

async function sincronizarCriacoesPendentes() {
  const fila = await dbListarTodos(STORE_CRIACOES);
  if (!fila.length) return;

  for (const item of fila) {
    try {
      const { offline_id, tentativas, ultimo_erro, criado_em_local, ...payload } = item;

      const { error } = await client
        .from('paradas')
        .insert([payload]);

      if (error) {
        await dbAtualizar(STORE_CRIACOES, {
          ...item,
          tentativas: (item.tentativas || 0) + 1,
          ultimo_erro: error.message
        });
        continue;
      }

      await dbRemover(STORE_CRIACOES, item.offline_id);

    } catch (err) {
      await dbAtualizar(STORE_CRIACOES, {
        ...item,
        tentativas: (item.tentativas || 0) + 1,
        ultimo_erro: err.message
      });
    }
  }
}

async function sincronizarFinalizacoesPendentes() {
  const fila = await dbListarTodos(STORE_FINALIZACOES);
  if (!fila.length) return;

  for (const item of fila) {
    try {
      const { offline_id, parada_id, tentativas, ultimo_erro, criado_em_local, ...dados } = item;

      if (!parada_id) {
        await dbAtualizar(STORE_FINALIZACOES, {
          ...item,
          tentativas: (item.tentativas || 0) + 1,
          ultimo_erro: 'Parada de referência ainda não foi sincronizada.'
        });
        continue;
      }

      const { error } = await client
        .from('paradas')
        .update(dados)
        .eq('id', parada_id);

      if (error) {
        await dbAtualizar(STORE_FINALIZACOES, {
          ...item,
          tentativas: (item.tentativas || 0) + 1,
          ultimo_erro: error.message
        });
        continue;
      }

      await dbRemover(STORE_FINALIZACOES, item.offline_id);

    } catch (err) {
      await dbAtualizar(STORE_FINALIZACOES, {
        ...item,
        tentativas: (item.tentativas || 0) + 1,
        ultimo_erro: err.message
      });
    }
  }
}

async function pedirPermissaoNotificacaoWeb() {
  if (!('Notification' in window)) return;

  if (Notification.permission === 'default') {

    } catch {}
  }
}

function notificarNovaParada(titulo, corpo) {
  if ('Notification' in window && Notification.permission === 'granted') {

      new Notification(titulo, { body: corpo });
    } catch {}
  }
}

async function carregarSetores() {
  if (!estaOnline() || modoOffline) {
    setoresCache = await buscarCacheConfig('setores') || [];
    return setoresCache;
  }

  const { data, error } = await client
    .from('setores')
    .select('*')
    .eq('ativo', true)
    .order('nome', { ascending: true });

  if (error) {
    setoresCache = await buscarCacheConfig('setores') || [];
    return setoresCache;
  }

  setoresCache = data || [];
  await salvarCacheConfig('setores', setoresCache);
  return setoresCache;
}

async function carregarMaquinasBase() {
  if (!estaOnline() || modoOffline) {
    maquinasCache = await buscarCacheConfig('maquinas') || [];
    return maquinasCache;
  }

  let query = client
    .from('maquinas')
     .select('id, nome, setor, ativa')
    .eq('ativa', true)
    .order('nome', { ascending: true });

  const { data, error } = await query;

  if (error) {
    maquinasCache = await buscarCacheConfig('maquinas') || [];
    return maquinasCache;
  }

  maquinasCache = data || [];
  await salvarCacheConfig('maquinas', maquinasCache);
  return maquinasCache;
}

function aoSelecionarSetor() {
  const setor = document.getElementById('setorSelect').value;
  document.getElementById('setor').value = setor || '';

  const maquinasFiltradas = maquinasCache.filter(m => m.setor === setor);
  preencherMaquinas(maquinasFiltradas);
}

async function configurarNovaParadaPorPerfil() {
  await carregarSetores();
  await carregarMaquinasBase();

  const selectSetor = document.getElementById('setorSelect');
  const inputSetor = document.getElementById('setor');
  const linha = document.getElementById('linhaSetorData');

  if (perfil.multi_setor || perfil.admin) {
    linha.className = 'grid-2';

    selectSetor.style.display = 'block';
    inputSetor.style.display = 'none';

    preencherSetores(setoresCache);
    preencherMaquinas([]);

  } else {
    linha.className = 'grid-2';

    selectSetor.style.display = 'none';
    inputSetor.style.display = 'block';

    const setorUsuario = perfil.setor || '';
    inputSetor.value = setorUsuario;

    const maquinasUsuario = maquinasCache.filter(m => m.setor === setorUsuario);
    preencherMaquinas(maquinasUsuario);
  }
}

});

window.addEventListener('load', async () => {
  await atualizarStatusConexao();
  atualizarAvisoLoginConexao();

  // 1) Tenta restaurar uma sessão já aberta neste aparelho (online ou offline),
  //    salva no IndexedDB. Isso é o que evita pedir login de novo a cada reload.
  const restaurou = await restaurarSessaoLocal();
  if (restaurou) return;

  // 2) Sem sessão local salva: se houver rede, tenta a sessão padrão do Supabase
  //    (cobre o caso de primeira visita após o deploy desta versão).
  if (!estaOnline()) return;

  try {
    const { data } = await client.auth.getSession();

    if (data?.session?.user) {
      usuario = data.session.user;
      modoOffline = false;
      await carregarPerfil();
    }
  } catch {
    // Falha ao restaurar sessão online; usuário pode logar offline se precisar.
  }
});

function atualizarAvisoLoginConexao() {
  const el = document.getElementById('statusConexaoLogin');
  if (!el) return;

  el.innerHTML = estaOnline()
    ? '<span class="ok">🟢 Online — login normal</span>'
    : '<span class="erro">🔴 Sem internet — você só pode entrar se já tiver feito login neste aparelho antes</span>';
}

async function verificarRevogacaoOffline() {
  // Roda quando a conexão volta: se este usuário foi revogado pelo admin,
  // limpa o cache offline local para impedir login offline futuro com dados antigos.
  if (!perfil?.email) return;

  try {
    const { data, error } = await client
      .from('perfis')
      .select('revogado_offline_em, ativo')
      .eq('id', perfil.id)
      .single();

    if (error || !data) return;

    if (data.revogado_offline_em || !data.ativo) {
      await dbRemover(STORE_CREDENCIAIS, perfil.email.trim().toLowerCase());
    }
  } catch {
    // Sem internet de fato ou outro erro: não faz nada, tenta de novo na próxima vez.
  }
}
