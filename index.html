<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Paradas">
<link rel="apple-touch-icon" href="icon-192.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Paradas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="modelo.css?v=5">
  <style>
.hidden {
    display: none !important;
}
</style>
</head>
<body>
  <div class="container">
    <div id="loginTela" class="card">
      <h1>Controle de Paradas</h1>
      <div id="statusConexaoLogin" class="small" style="margin-bottom:10px;"></div>
      <input type="email" id="email" placeholder="E-mail" />
      <input type="password" id="senha" placeholder="Senha" />
      <button onclick="login()">Entrar</button>
      <div id="loginMsg"></div>
    </div>

    <div id="appTela" class="hidden">
    <h2 id="saudacao">Controle Industrial</h2>

    <div class="small" id="dadosUsuario"></div>

    <div class="small"
         id="statusConexaoTopo"
         style="margin-top:8px;">
    </div>

    <div id="avisoModoOffline"
         class="small hidden"
         style="margin-top:8px;">
    </div>

<div id="homeTela" class="card">


<h2>Controle Industrial</h2>

<div class="grid-2">

    <button onclick="abrirModuloParadas()">
        Controle de Paradas
    </button>

    <button
        id="btnModuloManutencao"
        class="hidden"
        onclick="abrirModuloManutencao()">
        Manutenção
    </button>

    <button
        id="btnModuloAdmin"
        class="hidden"
        onclick="abrirModuloAdmin()">
        Configurações
    </button>

</div>

<button class="btn-secondary" onclick="logout()">
    Sair
</button>
</div>
<div id="menuParadasTela" class="card hidden">

    <h3>Controle de Paradas</h3>

    <button class="btn-secondary" onclick="voltarHome()">
        ← Voltar
    </button>

    <div class="grid-2">

        <button onclick="mostrarTela('novaParadaTela')">
            Nova parada
        </button>

        <button onclick="mostrarTela('abertasTela'); carregarAbertas()">
            Em aberto
        </button>

        <button onclick="mostrarTela('historicoTela'); carregarHistorico()">
            Histórico
        </button>

        <button onclick="mostrarTela('dashboardTela'); carregarDashboard()">
            Dashboard
        </button>

    </div>

</div>
<div id="novaParadaTela" class="card hidden">
  <h3>Nova parada</h3>
<button class="btn-secondary" onclick="voltarMenuParadas()">
← Voltar
</button>

  <div class="grid-2" id="linhaSetorData">
    <input type="date" id="dataParada" />

    <select id="setorSelect" onchange="aoSelecionarSetor()">
      <option value="">Selecione o setor</option>
    </select>
  </div>

  <input type="text" id="setor" readonly />

  <select id="maquinaSelect">
    <option value="">Selecione a máquina</option>
  </select>

  <textarea id="motivo" rows="4" placeholder="Motivo da parada"></textarea>

  <input type="time" id="horaInicio" />

  <div id="statusConexao" class="small"></div>
  <div id="filaOfflineInfo" class="small"></div>

  <button onclick="abrirParada()">Abrir parada</button>

  <div id="novaParadaMsg"></div>
</div>
<div id="abertasTela" class="card hidden">
  <h3>Paradas em aberto</h3>
<button class="btn-secondary" onclick="voltarMenuParadas()">
← Voltar
</button>
  <div id="painelPendenciasAbertas"></div>
  <div id="listaAbertas"></div>
</div>
<div id="historicoTela" class="card hidden">
<h3>Histórico</h3>

<button class="btn-secondary" onclick="voltarMenuParadas()">
← Voltar
</button>

  <div class="grid-3">          <input type="date" id="filtroInicioHistorico" />
          <input type="date" id="filtroFimHistorico" />
          <button onclick="carregarHistorico()">Aplicar filtro</button>
        </div>
        <div id="listaHistorico"></div>
      </div>

      <div id="dashboardTela" class="card hidden">
        <h3>Dashboard</h3>

<button class="btn-secondary" onclick="voltarMenuParadas()">
← Voltar
</button>
        <div class="grid-3">
          <input type="date" id="filtroInicioDash" />
          <input type="date" id="filtroFimDash" />
          <button onclick="carregarDashboard()">Aplicar filtro</button>
        </div>

        <div class="grid-4" id="resumoBoxes"></div>

        <h4 class="section-title">Resumo por máquina</h4>
        <div id="tabelaMaquinas"></div>
      </div>
<div id="manutencaoTela" class="card hidden">

    <h3>Manutenção</h3>

    <button class="btn-secondary" onclick="voltarHome()">
        ← Voltar
    </button>

    <div class="tabs">

        <button onclick="mostrarManutencaoAba('abaNovaManutencao')">
            Nova solicitação
        </button>

        <button onclick="mostrarManutencaoAba('abaSolicitacoesManutencao'); carregarSolicitacoesManutencao()">
            Solicitações
        </button>

        <button id="btnPainelManutencao"
                class="hidden"
                onclick="mostrarManutencaoAba('abaPainelManutencao'); carregarPainelManutencao()">
            Painel da manutenção
        </button>

    </div>

    <div id="abaNovaManutencao">

        <select id="manTipo">
            <option value="">Selecione o tipo de manutenção</option>
            <option value="PREVENTIVA">Preventiva</option>
            <option value="CORRETIVA">Corretiva</option>
        </select>

        <select id="manSetor" onchange="filtrarMaquinasManutencao()">
            <option value="">Selecione o setor</option>
        </select>

        <select id="manMaquina">
            <option value="">Selecione a máquina</option>
        </select>

        <select id="manEstado">
            <option value="">Selecione o estado do equipamento</option>
            <option value="PARADO">Parado</option>
            <option value="FUNCIONAMENTO_NORMAL">Funcionamento normal</option>
            <option value="FUNCIONAMENTO_REDUZIDO">Funcionamento reduzido</option>
        </select>

        <select id="manGravidade">
            <option value="">Selecione a gravidade</option>
            <option value="SEM_URGENCIA">Sem urgência</option>
            <option value="MODERADO">Moderado</option>
            <option value="URGENTE">Urgente</option>
        </select>

        <select id="manImpacto">
            <option value="">Selecione o impacto</option>
            <option value="PRODUCAO">Produção</option>
            <option value="QUALIDADE">Qualidade</option>
            <option value="SEGURANCA">Segurança</option>
            <option value="VELOCIDADE">Velocidade da linha</option>
            <option value="RENDIMENTO">Rendimento</option>
            <option value="SEM_IMPACTO">Sem impacto imediato</option>
            <option value="OUTRO">Outro</option>
        </select>

        <textarea
            id="manProblema"
            rows="4"
            placeholder="Descreva o problema">
        </textarea>

        <button onclick="solicitarManutencao()">
            Solicitar manutenção
        </button>

        <div id="manutencaoMsg"></div>

    </div>

    <div id="abaSolicitacoesManutencao" class="hidden">
        <h4 class="section-title">Solicitações</h4>
        <div id="listaSolicitacoesManutencao"></div>
    </div>

    <div id="abaPainelManutencao" class="hidden">
        <h4 class="section-title">Painel da manutenção</h4>
        <div id="listaPainelManutencao"></div>
    </div>

</div>
      <div id="adminTela" class="card hidden">
        <h3>Configurações</h3>
<button class="btn-secondary" onclick="voltarHome()">
← Voltar
</button>
        <div class="tabs">
          <button onclick="mostrarAdminAba('abaCriarUsuario')">Criar usuário</button>
          <button onclick="mostrarAdminAba('abaUsuarios')">Gerenciar usuários</button>
          <button onclick="mostrarAdminAba('abaCadastros')">Setores e máquinas</button>
        </div>

        <div id="abaCriarUsuario">
          <h4 class="section-title">Criar usuário</h4>

          <input type="text" id="novoNome" placeholder="Nome" />
          <input type="email" id="novoEmail" placeholder="E-mail" />
          <input type="password" id="novoPassword" placeholder="Senha" />
          <select id="novoSetor"></select>
          <input type="text" id="novoCargo" placeholder="Cargo" value="Lider" />

          <label class="inline-check">
            <input type="checkbox" id="novoAdmin"> Administrador
          </label>

          <label class="inline-check">
            <input type="checkbox" id="novoMultiSetor"> Pode lançar em qualquer setor
          </label>

          <button onclick="criarUsuario()">Criar usuário</button>
          <div id="adminMsg"></div>
        </div>

        <div id="abaUsuarios" class="hidden">
          <h4 class="section-title">Gerenciar usuários</h4>
          <div id="usuariosAdminLista"></div>
        </div>

        <div id="abaCadastros" class="hidden">
          <h4 class="section-title">Criar setor</h4>
          <input type="text" id="novoNomeSetor" placeholder="Nome do setor" />
          <button onclick="criarSetor()">Criar setor</button>
          <div id="setorMsg"></div>

          <h4 class="section-title">Criar máquina</h4>
          <input type="text" id="novaMaquinaCodigo" placeholder="Código da máquina" />
          <input type="text" id="novaMaquinaNome" placeholder="Nome da máquina" />
          <select id="novaMaquinaSetor"></select>
          <button onclick="criarMaquina()">Criar máquina</button>
          <div id="maquinaMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
 if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js'); 
} 
</script>

<script src="config.js?v=4"></script>
<script src="utils.js?v=4"></script>
<script src="offline.js?v=4"></script>
<script src="auth.js?v=4"></script>
<script src="paradas.js?v=4"></script>
<script src="manutencao.js?v=4"></script>
<script src="dashboard.js?v=4"></script>
<script src="admin.js?v=4"></script>
<script src="app.js?v=4"></script>

</body>
</html>
